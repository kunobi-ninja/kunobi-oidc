# Toolchain pinning for local development and CI.
#
# Local: install `mise` (https://mise.jdx.dev), then `mise install` in this
# directory provisions everything below. CI uses jdx/mise-action@v2 to do
# the same in the workflow.

[tools]
# Match the CI image (`rust:1.94-bookworm`) for reproducibility.
rust = "1.94.1"

# Static-analysis CLI used by `.github/workflows/ci.yml`.
"aqua:EmbarkStudios/cargo-deny" = "0.19.4"

# Mutation testing. Local-only by design (a full run takes 5-10 minutes
# on this crate, much too long to gate every PR). Run with `mise run mutants`.
"cargo:cargo-mutants" = "25.3.1"

[env]
# Honour the version above, even if a global rustup override is set.
RUSTUP_TOOLCHAIN = "1.94.1"

[tasks.mutants]
description = "Run cargo-mutants to surface untested code-mutation survivors. Mutates a working copy, not your source tree (safe to interrupt)."
run = "cargo mutants --no-times --timeout-multiplier 2 -- --all-features"

[tasks."mutants:file"]
description = "Run mutants on a single file (e.g. mise run mutants:file -- src/server/jwks.rs)"
run = "cargo mutants --no-times --timeout-multiplier 2 -- --all-features --file"

[tasks.coverage]
description = "Run Rust test coverage with cargo-tarpaulin."
run = "cargo tarpaulin --engine llvm --all-features --workspace --out Json --output-dir coverage"

[tasks."coverage:html"]
description = "Run Rust test coverage and render an HTML report."
run = "cargo tarpaulin --engine llvm --all-features --workspace --out Html --output-dir coverage"

[tasks.deny]
description = "Run cargo-deny policy checks."
run = "cargo deny check"
